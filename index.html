<!DOCTYPE html>
<html lang="ko">
<head>
  <script>
window.onerror = function(msg, url, line) {
    alert("🚨 에러 발생!\n내용: " + msg + "\n줄 번호: " + line);
};
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Among Us Enhanced</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');
*{box-sizing:border-box}
body{margin:0;background:#050505;color:white;font-family:'Nunito',sans-serif;overflow:hidden;user-select:none;touch-action:none}
canvas{display:block;touch-action:none}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20}
.panel{background:rgba(10,12,20,0.97);padding:32px;border-radius:20px;border:2px solid #2e3a4e;pointer-events:auto;text-align:center;box-shadow:0 25px 60px rgba(0,0,0,0.95);backdrop-filter:blur(20px);max-width:95%;max-height:92vh;overflow-y:auto}
h1{margin-top:0;color:#ff4757;font-size:2.2rem;text-shadow:0 0 30px rgba(255,71,87,0.5);letter-spacing:2px}
input[type=text]{padding:12px;font-size:14px;border-radius:10px;border:2px solid #2e3a4e;text-align:center;margin-bottom:12px;width:85%;max-width:250px;text-transform:uppercase;background:#181d28;color:white;font-family:'Nunito',sans-serif;font-weight:bold;outline:none;transition:border-color 0.2s;display:block;margin-left:auto;margin-right:auto}
input[type=text]:focus{border-color:#1dd1a1}
input[type=password]{padding:12px;font-size:14px;border-radius:10px;border:2px solid #2e3a4e;text-align:center;margin-bottom:12px;width:85%;max-width:250px;background:#181d28;color:white;font-family:'Nunito',sans-serif;font-weight:bold;outline:none;display:block;margin-left:auto;margin-right:auto}
button{padding:11px 22px;font-size:14px;font-weight:900;background:#1dd1a1;color:white;border:none;border-radius:10px;cursor:pointer;transition:0.18s;margin:4px;text-shadow:1px 1px 3px rgba(0,0,0,0.4)}
button:hover{transform:scale(1.05);filter:brightness(1.15)}
.btn-red{background:#ff4757}.btn-orange{background:#ffa502}.btn-purple{background:#a55eea}.btn-blue{background:#5352ed}.btn-gray{background:#747d8c}
hr{border-color:#1e2535;margin:14px 0}

/* COLOR / HAT PICKER */
#color-grid{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:12px}
.color-swatch{width:32px;height:32px;border-radius:8px;cursor:pointer;border:3px solid transparent;transition:0.15s}
.color-swatch.selected{border-color:#fff;transform:scale(1.2);box-shadow:0 0 10px rgba(255,255,255,0.4)}
#hat-grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:10px}
.hat-btn{width:38px;height:38px;border-radius:8px;cursor:pointer;border:2px solid #2e3a4e;background:#181d28;font-size:17px;display:flex;align-items:center;justify-content:center;transition:0.15s}
.hat-btn.selected{border-color:#ffa502;background:#2a2010}

/* GAME UI */
#game-ui{position:absolute;top:15px;left:15px;pointer-events:none;display:none;z-index:5;text-shadow:1px 1px 4px black}
#room-info{font-size:16px;color:#1dd1a1;margin-bottom:3px}
#player-count{font-size:12px;color:#8892a4;margin-bottom:6px}
#task-bar-container{width:175px;height:12px;background:rgba(0,0,0,0.7);border:2px solid #fff;border-radius:6px;margin-bottom:6px;overflow:hidden;display:none}
#task-bar-fill{width:0%;height:100%;background:linear-gradient(90deg,#2ed573,#7bed9f);transition:width 0.4s}
#sabotage-alert{color:#ff4757;font-size:14px;font-weight:900;display:none;animation:blink 0.7s infinite}
#role-banner{font-size:12px;margin-top:3px}
#kill-cd-bar{display:none;width:175px;height:7px;background:rgba(0,0,0,0.5);border:1px solid #ff4757;border-radius:3px;margin-top:4px;overflow:hidden}
#kill-cd-fill{height:100%;background:#ff4757;transition:width 0.3s;width:100%}
#host-start-btn{pointer-events:auto;display:none;background:#ffa502;margin-top:8px;font-size:13px;padding:8px 16px}
#map-label{position:absolute;bottom:15px;left:15px;font-size:12px;color:#4a5568;pointer-events:none;display:none;z-index:5}

/* MINIMAP */
#minimap-container{position:absolute;top:15px;right:15px;width:130px;height:130px;background:rgba(5,5,10,0.9);border:2px solid #2e3a4e;border-radius:10px;overflow:hidden;display:none;z-index:4;pointer-events:none}

/* PASSIVE CHAT */
#passive-chat{position:absolute;bottom:20px;left:20px;width:260px;z-index:15;display:none;flex-direction:column;gap:6px}
#passive-chat-box{height:130px;background:rgba(5,8,15,0.82);border:1px solid #2e3a4e;border-radius:10px;padding:8px;overflow-y:auto;font-size:12px;backdrop-filter:blur(8px)}
#passive-chat-row{display:flex;gap:5px;pointer-events:auto}
#passive-chat-input{flex:1;padding:8px;border-radius:7px;border:1px solid #2e3a4e;background:rgba(15,20,35,0.9);color:white;font-size:12px;font-family:'Nunito',sans-serif;outline:none}
#passive-chat-input:focus{border-color:#1dd1a1}
#passive-chat-send{padding:8px 12px;font-size:12px;margin:0;border-radius:7px}

/* JOYSTICK */
#joystick-zone{position:absolute;bottom:0;left:0;width:50%;height:55%;z-index:10;pointer-events:auto;display:none}

/* ACTION BUTTONS */
#action-container{position:absolute;bottom:20px;right:20px;display:none;gap:8px;z-index:15;flex-wrap:wrap-reverse;justify-content:flex-end;width:190px}
.action-btn{width:72px;height:72px;border-radius:50%;font-weight:900;font-size:10px;display:none;text-align:center;border:3px solid;color:white;cursor:pointer;pointer-events:auto;transition:0.12s;flex-direction:column;justify-content:center;align-items:center;box-shadow:0 6px 18px rgba(0,0,0,0.6);user-select:none;line-height:1.3}
.action-btn:active{transform:scale(0.88)}
#kill-btn{background:rgba(255,71,87,0.78);border-color:#ff4757}
#report-btn{background:rgba(255,165,2,0.78);border-color:#ffa502}
#task-btn{background:rgba(46,213,115,0.78);border-color:#2ed573}
#vent-btn{background:rgba(116,125,140,0.78);border-color:#747d8c}
#sabotage-btn{background:rgba(165,94,234,0.78);border-color:#a55eea}
#emergency-btn{background:rgba(192,57,43,0.78);border-color:#c0392b}
.action-btn.disabled{opacity:0.3;pointer-events:none;background:rgba(30,30,30,0.5)!important;border-color:#333!important}

/* TASK POPUP */
#minigame-popup{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#0d0f16;width:92%;max-width:520px;height:64%;max-height:430px;border:3px solid #2e3a4e;border-radius:18px;z-index:100;pointer-events:auto;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.9)}
#task-canvas{width:100%;height:100%;display:block;touch-action:none}
#close-task-btn{position:absolute;top:10px;right:10px;background:#ff4757;color:white;border:none;padding:8px 12px;border-radius:7px;cursor:pointer;font-weight:bold;z-index:101;font-size:12px}

/* CUTSCENE */
#cutscene-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:99;pointer-events:auto}
#cutscene-text{font-size:2.4rem;font-weight:900;color:#ff4757;text-align:center;text-shadow:0 0 30px rgba(255,71,87,0.7);animation:punch 0.5s ease-out forwards}
#cutscene-sub{font-size:1rem;color:#ced6e0;margin-top:12px;animation:fadeIn 0.8s 0.5s both}

/* VOTING */
#voting-ui{display:none;background:rgba(5,5,10,0.98)}
.voting-wrapper{display:flex;flex-direction:column;width:93%;max-width:820px;height:83%;background:#0c0e15;border-radius:20px;border:2px solid #2e3a4e;pointer-events:auto;overflow:hidden;box-shadow:0 15px 40px rgba(0,0,0,0.95)}
.voting-header{padding:14px 18px;background:rgba(255,71,87,0.07);border-bottom:2px solid #1a2030;display:flex;align-items:center;justify-content:space-between}
.voting-timer{font-size:1.7rem;font-weight:900;color:#ffa502}
.voting-body{display:flex;flex:1;overflow:hidden;flex-direction:column}
.voting-left{flex:1.3;padding:14px;display:flex;flex-direction:column;overflow-y:auto;border-bottom:2px solid #1a2030}
.vote-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
.vote-card{background:#151922;padding:10px;border-radius:10px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;border:2px solid transparent;color:white;font-size:13px;transition:0.15s}
.vote-card:hover:not(.dead){border-color:#1dd1a1;background:#1a2230}
.vote-card.selected{border-color:#ff4757;background:#200d10}
.vote-card.dead{opacity:0.22;pointer-events:none;filter:grayscale(1)}
.voting-right{flex:1;padding:14px;display:flex;flex-direction:column;background:#090b11}
#voting-chat-box{flex:1;background:#060709;border-radius:8px;padding:9px;overflow-y:auto;margin-bottom:9px;font-size:12px;border:1px solid #1a1d28}
.chat-msg{margin-bottom:4px;line-height:1.4}
.chat-system{color:#5a6272;font-style:italic;font-size:11px}
.chat-input-row{display:flex;gap:5px}
#vote-chat-input{flex:1;padding:8px;border-radius:7px;border:1px solid #2e3a4e;background:#111520;color:white;font-size:12px;margin-bottom:0;font-family:'Nunito',sans-serif;outline:none}
#vote-chat-input:focus{border-color:#1dd1a1}

/* GAME OVER */
#game-over-ui{display:none;background:rgba(0,0,0,0.93)}
#winner-text{font-size:2.6rem;margin-bottom:16px;text-align:center;animation:punch 0.6s ease-out}
#result-list{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:20px}
.result-player{background:#151922;border-radius:10px;padding:9px 16px;font-size:13px;display:flex;align-items:center;gap:7px;border:2px solid #2e3a4e}
.result-imposter{border-color:#ff4757;background:#1a080a}
.result-dead{opacity:0.35}

/* DEV MODE */
#dev-ui{display:none;background:rgba(0,0,0,0.97)}
.dev-panel{background:#0a0d14;padding:24px;border-radius:16px;border:2px solid #a55eea;width:96%;max-width:700px;max-height:92vh;overflow-y:auto;pointer-events:auto}
.dev-panel h2{color:#a55eea;margin-top:0;font-size:1.4rem}
.dev-section{background:#0f1320;border-radius:10px;padding:14px;margin-bottom:14px;border:1px solid #1e2535;text-align:left}
.dev-section h4{margin:0 0 10px;color:#ffa502;font-size:13px;text-transform:uppercase;letter-spacing:1px}
.dev-btn-grid{display:flex;flex-wrap:wrap;gap:7px}
.dev-log{font-family:monospace;font-size:11px;color:#2ed573;background:#060910;padding:10px;border-radius:7px;height:100px;overflow-y:auto;border:1px solid #1a2030;margin-top:8px;white-space:pre-wrap}
.dev-info{font-size:12px;color:#8892a4;line-height:1.6}

/* SAB MENU */
#sabotage-menu{display:none;position:absolute;bottom:155px;right:20px;background:#0c0e15;border:2px solid #a55eea;border-radius:12px;padding:12px;z-index:20;pointer-events:auto;min-width:150px}

@keyframes punch{0%{transform:scale(3.5);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.15}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes taskDone{0%{filter:brightness(1)}50%{filter:brightness(2.5)}100%{filter:brightness(1)}}

@media(min-width:768px){
  .voting-body{flex-direction:row}
  .voting-left{border-bottom:none;border-right:2px solid #1a2030}
  .action-btn{width:82px;height:82px;font-size:11px}
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="joystick-zone"></div>

<!-- HUD -->
<div id="game-ui">
  <div id="room-info"></div>
  <div id="player-count"></div>
  <div id="task-bar-container"><div id="task-bar-fill"></div></div>
  <div id="sabotage-alert">⚠️ 사보타지!</div>
  <div id="role-banner"></div>
  <div id="kill-cd-bar"><div id="kill-cd-fill"></div></div>
  <div id="host-start-panel" style="display:none;pointer-events:auto;margin-top:8px">
    <div style="font-size:11px;color:#8892a4;margin-bottom:4px">임포스터 인원</div>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
      <button id="imp-minus" onclick="changeImpCount(-1)" style="padding:4px 10px;font-size:14px;margin:0;background:#2e3a4e;border-radius:6px">−</button>
      <span id="imp-count-display" style="font-size:18px;font-weight:900;color:#ff4757;min-width:24px;text-align:center">1</span>
      <button id="imp-plus" onclick="changeImpCount(1)" style="padding:4px 10px;font-size:14px;margin:0;background:#2e3a4e;border-radius:6px">+</button>
      <span style="font-size:11px;color:#5a6272">/ <span id="imp-max-label">1</span>명 최대</span>
    </div>
    <button id="host-start-btn" onclick="hostStartGame()" style="background:#ffa502;font-size:13px;padding:8px 16px">🚀 게임 시작</button>
  </div>
</div>
<div id="map-label"></div>

<div id="minimap-container">
  <canvas id="minimap-canvas" width="130" height="130"></canvas>
</div>

<!-- Passive Chat -->
<div id="passive-chat">
  <div id="passive-chat-box"></div>
  <div id="passive-chat-row">
    <input type="text" id="passive-chat-input" placeholder="채팅..." maxlength="50" onkeydown="if(event.key==='Enter')sendPassiveChat()">
    <button id="passive-chat-send" onclick="sendPassiveChat()">↑</button>
  </div>
</div>

<!-- Cutscene -->
<div id="cutscene-overlay">
  <div id="cutscene-text">🚨 DEAD BODY REPORTED</div>
  <div id="cutscene-sub"></div>
</div>

<!-- Action Buttons -->
<div id="action-container">
  <div id="emergency-btn" class="action-btn" onpointerdown="sendAction('emergency');event.preventDefault()">🔴<br>EMERG<br>[Q]</div>
  <div id="task-btn" class="action-btn" onpointerdown="performTask();event.preventDefault()">⚙️<br>TASK<br>[E]</div>
  <div id="vent-btn" class="action-btn" onpointerdown="toggleVent();event.preventDefault()">🕳️<br>VENT<br>[V]</div>
  <div id="sabotage-btn" class="action-btn" onpointerdown="openSabMenu();event.preventDefault()">💡<br>SAB<br>[G]</div>
  <div id="report-btn" class="action-btn" onpointerdown="sendAction('report');event.preventDefault()">📢<br>REPORT<br>[R]</div>
  <div id="kill-btn" class="action-btn" onpointerdown="sendAction('kill');event.preventDefault()">🔪<br>KILL<br>[SPC]</div>
</div>

<!-- Sabotage menu -->
<div id="sabotage-menu">
  <div style="color:#a55eea;font-weight:900;font-size:12px;margin-bottom:8px">⚡ 사보타지</div>
  <button class="btn-red" style="width:100%;margin-bottom:5px" onclick="sendAction('sabotage_lights');closeSabMenu()">💡 정전</button>
  <button style="background:#ff6b35;width:100%;margin-bottom:5px" onclick="sendAction('sabotage_reactor');closeSabMenu()">☢️ 원자로</button>
  <button class="btn-blue" style="width:100%" onclick="sendAction('sabotage_o2');closeSabMenu()">💨 산소누출</button>
</div>

<!-- Task Popup -->
<div id="minigame-popup">
  <button id="close-task-btn" onpointerdown="closeMinigame();event.preventDefault()">✕</button>
  <canvas id="task-canvas"></canvas>
</div>

<!-- MENU -->
<div class="overlay" id="menu-ui">
  <div class="panel" style="width:96%;max-width:500px">
    <h1>☠ AMONG US</h1>
    <!-- DEV MODE BUTTON (hidden, top-right corner) -->
    <div style="position:relative">
      <div id="dev-secret-btn" onclick="promptDevMode()" style="position:absolute;top:-60px;right:-20px;width:18px;height:18px;background:transparent;cursor:pointer;border-radius:50%" title=""></div>
    </div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
      <div style="flex:1;min-width:190px">
        <div style="font-size:12px;color:#747d8c;margin-bottom:6px">닉네임</div>
        <input type="text" id="nickname" placeholder="닉네임" maxlength="8" value="Player">
        <hr>
        <button class="btn-red" onclick="createRoom()" style="width:100%;margin-bottom:8px">🏠 방 만들기</button>
        <input type="text" id="room-code" placeholder="방 코드 5자리">
        <button class="btn-blue" onclick="joinRoom()" style="width:100%">🚪 입장하기</button>
        <hr>
        <button class="btn-purple" onclick="promptDevMode()" style="width:100%;font-size:12px;padding:8px">🛠 개발자 모드</button>
      </div>
      <div style="flex:1;min-width:190px">
        <div style="font-size:12px;color:#747d8c;margin-bottom:6px">캐릭터 커스텀</div>
        <canvas id="avatar-preview" width="70" height="90" style="display:block;margin:0 auto 10px;border-radius:8px;background:#0d0f16"></canvas>
        <div style="font-size:11px;color:#555;margin-bottom:5px">색상</div>
        <div id="color-grid"></div>
        <div style="font-size:11px;color:#555;margin-bottom:5px;margin-top:5px">모자</div>
        <div id="hat-grid"></div>
      </div>
    </div>
  </div>
</div>

<!-- VOTING -->
<div class="overlay" id="voting-ui">
  <div class="voting-wrapper">
    <div class="voting-header">
      <span style="color:#ff4757;font-weight:900;font-size:1rem">🚨 긴급 재판</span>
      <span class="voting-timer" id="voting-timer">60</span>
    </div>
    <div class="voting-body">
      <div class="voting-left">
        <div class="vote-grid" id="vote-grid"></div>
        <button class="btn-gray" onclick="castVote('SKIP')" style="width:100%;margin-top:10px">🙅 건너뛰기</button>
      </div>
      <div class="voting-right">
        <div id="voting-chat-box"></div>
        <div class="chat-input-row">
          <input type="text" id="vote-chat-input" placeholder="의견..." maxlength="60" onkeydown="if(event.key==='Enter')sendVoteChat()" style="text-transform:none">
          <button onclick="sendVoteChat()" style="padding:8px 12px;margin:0;font-size:12px">전송</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- GAME OVER -->
<div class="overlay" id="game-over-ui">
  <div class="panel" style="max-width:580px">
    <div id="winner-text"></div>
    <div id="winner-sub" style="color:#ced6e0;font-size:14px;margin-bottom:18px"></div>
    <div id="result-list"></div>
    <button onclick="restartToLobby()" class="btn-green" style="background:#1dd1a1">🔄 로비로</button>
  </div>
</div>

<!-- DEV MODE -->
<div class="overlay" id="dev-ui">
  <div class="dev-panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2>🛠 개발자 모드</h2>
      <button class="btn-gray" onclick="closeDevMode()" style="padding:8px 14px">✕ 닫기</button>
    </div>
    <div class="dev-section">
      <h4>📍 맵 선택</h4>
      <div class="dev-btn-grid">
        <button onclick="devSetMap('skeld')" class="btn-blue">더 스케드</button>
        <button onclick="devSetMap('mira')" style="background:#27ae60">미라 HQ</button>
        <button onclick="devSetMap('polus')" class="btn-orange">폴러스</button>
      </div>
    </div>
    <div class="dev-section">
      <h4>👤 역할 테스트</h4>
      <div class="dev-btn-grid">
        <button onclick="devSetRole('crewmate')" style="background:#2ed573">크루원</button>
        <button onclick="devSetRole('imposter')" class="btn-red">임포스터</button>
        <button onclick="devSetRole('engineer')" class="btn-blue">엔지니어</button>
        <button onclick="devSetRole('scientist')" class="btn-purple">사이언티스트</button>
      </div>
    </div>
    <div class="dev-section">
      <h4>⚙️ 업무 테스트</h4>
      <div class="dev-btn-grid">
        <button onclick="devOpenTask('wires')">🔧 배선 연결</button>
        <button onclick="devOpenTask('cardswipe')">💳 카드 스와이프</button>
        <button onclick="devOpenTask('asteroids')">☄️ 소행성</button>
        <button onclick="devOpenTask('stars')">⭐ 별 지도</button>
        <button onclick="devOpenTask('fuel')">⛽ 연료 주입</button>
        <button onclick="devOpenTask('reactor')">☢️ 원자로 핸드</button>
      </div>
    </div>
    <div class="dev-section">
      <h4>⚡ 사보타지 테스트</h4>

let aCtx = null;
try {
  aCtx = new (window.AudioContext || window.webkitAudioContext)();
} catch(e) {
  console.log("오디오를 지원하지 않는 기기입니다.");

function snd(type){
  try{
    if(!aCtx) return; // 오디오 기능이 없으면 그냥 넘어가게 방어!
    if(aCtx.state==='suspended')aCtx.resume();
    const o=aCtx.createOscillator(),g=aCtx.createGain();
    o.connect(g);g.connect(aCtx.destination);
    const t=aCtx.currentTime;
    ({
      kill:()=>{o.type='sawtooth';o.frequency.setValueAtTime(180,t);o.frequency.exponentialRampToValueAtTime(40,t+0.25);g.gain.setValueAtTime(0.4,t);g.gain.linearRampToValueAtTime(0,t+0.25);o.start();o.stop(t+0.25)},
      report:()=>{o.type='triangle';o.frequency.setValueAtTime(600,t);o.frequency.setValueAtTime(900,t+0.15);g.gain.setValueAtTime(0.3,t);g.gain.linearRampToValueAtTime(0,t+0.4);o.start();o.stop(t+0.4)},
      sabotage:()=>{o.type='sine';o.frequency.setValueAtTime(250,t);o.frequency.linearRampToValueAtTime(80,t+0.6);g.gain.setValueAtTime(0.35,t);g.gain.linearRampToValueAtTime(0,t+0.7);o.start();o.stop(t+0.7)},
      task:()=>{o.type='sine';o.frequency.setValueAtTime(523,t);o.frequency.setValueAtTime(659,t+0.1);o.frequency.setValueAtTime(784,t+0.2);g.gain.setValueAtTime(0.2,t);g.gain.linearRampToValueAtTime(0,t+0.4);o.start();o.stop(t+0.4)},
      emergency:()=>{o.type='square';o.frequency.setValueAtTime(440,t);o.frequency.setValueAtTime(220,t+0.1);o.frequency.setValueAtTime(440,t+0.2);g.gain.setValueAtTime(0.25,t);g.gain.linearRampToValueAtTime(0,t+0.35);o.start();o.stop(t+0.35)},
      eject:()=>{o.type='sine';o.frequency.setValueAtTime(880,t);o.frequency.exponentialRampToValueAtTime(110,t+1.0);g.gain.setValueAtTime(0.3,t);g.gain.linearRampToValueAtTime(0,t+1.0);o.start();o.stop(t+1.0)},
    }[type]||function(){})();
  }catch(e){}
}
function bcastSnd(t){snd(t);for(let c in clients)clients[c].send({type:'sound',st:t});}

  const octx=oc.getContext('2d');
  octx.drawImage(spriteImg,sx,sy,sw,sh,0,0,sw,sh);
  const id=octx.getImageData(0,0,sw,sh);
  const d=id.data;
  // The sprite base is red (#c51111 ≈ r:197,g:17,b:17)
  // We remap: for each pixel, shift hue to target color
  for(let i=0;i<d.length;i+=4){
    if(d[i+3]<10) continue; // skip transparent
    const r=d[i],g=d[i+1],b=d[i+2];
    // brightness from red channel (dominant in source)
    const bright=(r*0.6+g*0.2+b*0.2)/255;
    // dark areas (shadows/outline) — keep dark
    const lum=(r*0.299+g*0.587+b*0.114);
    if(lum<40){ // very dark = outline, keep black-ish
      d[i]=Math.round(r*0.4); d[i+1]=Math.round(g*0.4); d[i+2]=Math.round(b*0.4);
    } else if(r>180&&g<80&&b<80){ // bright red body → tint to player color
      d[i]=Math.min(255,Math.round(rgb[0]*bright*1.4));
      d[i+1]=Math.min(255,Math.round(rgb[1]*bright*1.4));
      d[i+2]=Math.min(255,Math.round(rgb[2]*bright*1.4));
    } else if(r>100&&g<60&&b<60){ // darker red (shadow) → darker tint
      const f=bright*0.7;
      d[i]=Math.min(255,Math.round(rgb[0]*f));
      d[i+1]=Math.min(255,Math.round(rgb[1]*f));
      d[i+2]=Math.min(255,Math.round(rgb[2]*f));
    }
    // visor (high blue & green) stays as-is
  }
  octx.putImageData(id,0,0);
  return oc;
}

function buildTintCache(){
  if(!spriteReady) return;
  const fw=spriteImg.width/SPRITE_COLS;
  const fh=spriteImg.height/SPRITE_ROWS;
  COLORS.forEach(hex=>{
    if(tintCache[hex]) return;
    const rgb=hexToRgb(hex);
    const frames=[];
    for(let f=0;f<SPRITE_FRAMES;f++){
      const col=f%SPRITE_COLS, row=Math.floor(f/SPRITE_COLS);
      frames.push(buildTintedFrame(col*fw,row*fh,fw,fh,rgb));
    }
    tintCache[hex]=frames;
  });
  // also white for ghost
  if(!tintCache['#ffffff']){
    const rgb=[220,220,220];
    const fw2=spriteImg.width/SPRITE_COLS, fh2=spriteImg.height/SPRITE_ROWS;
    const frames=[];
    for(let f=0;f<SPRITE_FRAMES;f++){
      const col=f%SPRITE_COLS,row=Math.floor(f/SPRITE_COLS);
      frames.push(buildTintedFrame(col*fw2,row*fh2,fw2,fh2,rgb));
    }
    tintCache['#ffffff']=frames;
  }
}

// Ensure a color's frames exist
function ensureTint(hex){
  if(tintCache[hex]||!spriteReady) return;
  const rgb=hexToRgb(hex);
  const fw=spriteImg.width/SPRITE_COLS, fh=spriteImg.height/SPRITE_ROWS;
  const frames=[];
  for(let f=0;f<SPRITE_FRAMES;f++){
    const col=f%SPRITE_COLS,row=Math.floor(f/SPRITE_COLS);
    frames.push(buildTintedFrame(col*fw,row*fh,fw,fh,rgb));
  }
  tintCache[hex]=frames;
}

// animT is global walk timer (incremented in mainLoop)
// frameIdx: 0=idle, 1-9=walk cycle
function drawChar(c,x,y,color,hat,facing,dead,scale=1){
  ensureTint(color);
  c.save();c.translate(x,y);

  if(dead){
    // ghost: faded, floating
    c.globalAlpha=0.45;
    c.scale(facing*scale,scale);
    if(spriteReady&&tintCache[color]){
      const fw=spriteImg.width/SPRITE_COLS,fh=spriteImg.height/SPRITE_ROWS;
      const dw=fw*0.7,dh=fh*0.7;
      c.drawImage(tintCache[color][0],-dw/2,-dh/2,dw,dh);
    } else {
      c.fillStyle=color;c.beginPath();c.arc(0,-8,18,Math.PI,0);c.fillRect(-18,-8,36,20);c.fill();
    }
    // ghost glow
    c.globalAlpha=0.15;
    c.fillStyle='#88ccff';c.beginPath();c.arc(0,-10,22,0,Math.PI*2);c.fill();
    c.globalAlpha=1;
    // hat above ghost
    if(hat){c.font=`${18*Math.abs(scale)}px serif`;c.textAlign='center';c.textBaseline='middle';c.fillText(hat,0,-52);}
    c.restore();return;
  }

  c.scale(facing*scale,scale);

  if(spriteReady&&tintCache[color]){
    const fw=spriteImg.width/SPRITE_COLS,fh=spriteImg.height/SPRITE_ROWS;
    // display size: height ~56px, maintain aspect
    const dh=56,dw=fw/fh*dh;
    // shadow
    c.fillStyle='rgba(0,0,0,0.22)';c.beginPath();c.ellipse(0,dh/2-2,dw*0.4,5,0,0,Math.PI*2);c.fill();
    c.drawImage(tintCache[color][currentSpriteFrame],-dw/2,-dh/2,dw,dh);
    // hat
    if(hat){c.font=`${18*Math.abs(scale)}px serif`;c.textAlign='center';c.textBaseline='middle';c.fillText(hat,0,-dh/2-12);}
  } else {
    // fallback canvas draw
    c.fillStyle='rgba(0,0,0,0.2)';c.beginPath();c.ellipse(0,24,16,5,0,0,Math.PI*2);c.fill();
    c.fillStyle=color;c.beginPath();c.ellipse(0,2,18,22,0,0,Math.PI*2);c.fill();
    c.beginPath();c.ellipse(3,-21,16,13,0,0,Math.PI*2);c.fill();
    const grd=c.createLinearGradient(6,-30,16,-14);
    grd.addColorStop(0,'rgba(180,240,255,0.95)');grd.addColorStop(1,'rgba(60,160,210,0.75)');
    c.fillStyle=grd;c.beginPath();c.ellipse(9,-21,9,7,0,0,Math.PI*2);c.fill();
    if(hat){c.font='18px serif';c.textAlign='center';c.textBaseline='middle';c.fillText(hat,0,-44);}
  }
  c.restore();
}

function createRoom(){
  const code=Math.random().toString(36).substring(2,7).toUpperCase();
  peer=new Peer('AMG3-'+code);
  peer.on('open',id=>{
    isHost=true;myId=id;
    enterGame(`🏠 코드: ${code}`);
    addPlayer(myId,document.getElementById('nickname').value||'Host',myColor,myHat);
    startLoop();
  });
  peer.on('connection',conn=>{
    conn.on('open',()=>{
      clients[conn.peer]=conn;
      conn.on('data',d=>{
        if(d.type==='join')addPlayer(conn.peer,d.name,d.color,d.hat);
        else if(d.type==='input')handleMove(conn.peer,d.keys,d.vec);
        else if(d.type==='action')processAction(conn.peer,d.action,d.extra);
        else if(d.type==='vote')handleVote(conn.peer,d.tid);
        else if(d.type==='chat')relayChat(conn.peer,d.msg);
        else if(d.type==='task_done'){GS.tasksCompleted++;checkWin();snd('task');}
        else if(d.type==='vent')handleVent(conn.peer);
      });
    });
  });
}
function joinRoom(){
  const code=document.getElementById('room-code').value.toUpperCase().trim();
  peer=new Peer();
  peer.on('open',id=>{
    myId=id;hostConn=peer.connect('AMG3-'+code);
    hostConn.on('open',()=>{
      enterGame('게임 참여 중...');
      hostConn.send({type:'join',name:document.getElementById('nickname').value||'Player',color:myColor,hat:myHat});
      startLoop();
    });
    hostConn.on('data',d=>{
      if(d.type==='state')syncState(d.gs);
      if(d.type==='chat_bc')appendChat(document.getElementById('passive-chat-box'),d.name,d.msg,d.color,false);
      if(d.type==='vchat_bc')appendChat(document.getElementById('voting-chat-box'),d.name,d.msg,d.color,false);
      if(d.type==='sound')snd(d.st);
      if(d.type==='cutscene')triggerCutscene(d.by,d.vcol);
    });
  });
}
function enterGame(info){
  document.getElementById('menu-ui').style.display='none';
  document.getElementById('game-ui').style.display='block';
  document.getElementById('minimap-container').style.display='block';
  document.getElementById('joystick-zone').style.display='block';
  document.getElementById('passive-chat').style.display='flex';
  document.getElementById('map-label').style.display='block';
  document.getElementById('room-info').innerText=info;
  if(aCtx.state==='suspended')aCtx.resume();
}
function addPlayer(id,name,color,hat){
  const used=Object.values(GS.players).map(p=>p.color);
  const col=color||(COLORS.find(c=>!used.includes(c))||'#fff');
  const sp=MAP.spawn||{x:1480,y:1380};
  GS.players[id]={x:sp.x,y:sp.y,color:col,name,hat:hat||'',isDead:false,facing:1,isMoving:false,inVent:-1};
}
function sendAll(d){for(let c in clients)clients[c].send(d);}

function hostStartGame(){
  const pIds=Object.keys(GS.players); if(pIds.length<1)return;
  MAP=MAPS[currentMapId]; GS.mapId=currentMapId;
  GS.phase='Playing';GS.corpses=[];GS.votes={};GS.tallies={};
  GS.sabActive=null;GS.sabTimer=0;GS.sabCD=15;
  GS.tasksCompleted=0;GS.visualTasks={};
  GS.killCDs={};GS.emergCDs={};
  const normalTasks=MAP.tasks.filter(t=>!t.isSab);
  GS.tasksTotal=pIds.length*normalTasks.length;
  const shuffled=[...pIds].sort(()=>Math.random()-0.5);
  // use host-selected count, clamped to safe range
  const maxImps=Math.max(1,Math.floor(pIds.length/2));
  const numImps=Math.max(1,Math.min(selectedImpCount,maxImps));
  GS.imposters=shuffled.slice(0,numImps);
  GS.roles={};
  // assign special roles to non-imposters (engineer, scientist cycle)
  let specialIdx=0;
  const specialRoles=['engineer','scientist'];
  pIds.forEach((id,i)=>{
    const isImp=GS.imposters.includes(id);
    let role='crewmate';
    if(isImp){ role='imposter'; }
    else if(pIds.length>=4&&specialIdx<2){ role=specialRoles[specialIdx++]; }
    GS.roles[id]=role;
    const sp=MAP.spawn||{x:1480,y:1380};
    GS.players[id]={...GS.players[id],x:sp.x+Math.random()*160-80,y:sp.y+Math.random()*160-80,isDead:false,inVent:-1};
    GS.killCDs[id]=KILL_CD_TIME; GS.emergCDs[id]=0;
  });
  document.getElementById('passive-chat-box').innerHTML='';
  const roleMsg=`임포스터 ${numImps}명 / 엔지니어 ${pIds.length>=4?1:0}명 / 사이언티스트 ${pIds.length>=5?1:0}명`;
  sysChat(`게임 시작! ${roleMsg}`);
}

function collides(x,y,s=16){
  if(x-s<0||x+s>WORLD||y-s<0||y+s>WORLD)return true;
  for(const w of MAP.walls){if(x+s>w.x&&x-s<w.x+w.w&&y+s>w.y&&y-s<w.y+w.h)return true;}
  return false;
}

function handleMove(id,k,v){
  const p=GS.players[id]; if(!p||p.isDead||GS.phase!=='Playing')return;
  if(p.inVent!==-1){
    const vent=MAP.vents.find(vt=>vt.id===p.inVent);
    if(!vent)return;
    if((k&&(k.d||k.s))||(v&&(v.x>0.5||v.y>0.5))){
      const nid=vent.linked[0]; p.inVent=nid;
      const nv=MAP.vents.find(vt=>vt.id===nid); if(nv){p.x=nv.x;p.y=nv.y;}
    } else if((k&&(k.a||k.w))||(v&&(v.x<-0.5||v.y<-0.5))){
      const nid=vent.linked[1]||vent.linked[0]; p.inVent=nid;
      const nv=MAP.vents.find(vt=>vt.id===nid); if(nv){p.x=nv.x;p.y=nv.y;}
    }
    return;
  }
  let dx=0,dy=0;
  if(v&&(v.x||v.y)){dx=v.x*SPD;dy=v.y*SPD;if(dx)p.facing=dx<0?-1:1;}
  else if(k){
    if(k.w)dy-=SPD;if(k.s)dy+=SPD;
    if(k.a){dx-=SPD;p.facing=-1;}if(k.d){dx+=SPD;p.facing=1;}
    if(dx&&dy){dx*=0.707;dy*=0.707;}
  }
  p.isMoving=!!(dx||dy);
  if(!collides(p.x+dx,p.y))p.x+=dx;
  if(!collides(p.x,p.y+dy))p.y+=dy;
}

function handleVent(id){
  const p=GS.players[id]; if(!p||p.isDead)return;
  const role=GS.roles[id];
  const canVent=GS.imposters.includes(id)||role==='engineer';
  if(!canVent)return;
  if(p.inVent!==-1){p.inVent=-1;}
  else{MAP.vents.forEach(v=>{if(Math.hypot(p.x-v.x,p.y-v.y)<65){p.inVent=v.id;p.x=v.x;p.y=v.y;}});}
}
function toggleVent(){
  if(!GS.players[myId])return;
  const role=GS.roles[myId];
  if(!GS.imposters.includes(myId)&&role!=='engineer')return;
  isHost?handleVent(myId):hostConn.send({type:'vent'});
}

function processAction(id,action,extra){
  const p=GS.players[id]; if(!p||p.isDead)return;
  const isImp=GS.imposters.includes(id);

  if(action==='kill'&&isImp&&p.inVent===-1){
    if((GS.killCDs[id]||0)>0)return;
    for(const tid in GS.players){
      const t=GS.players[tid];
      if(tid!==id&&!t.isDead&&!GS.imposters.includes(tid)&&t.inVent===-1&&Math.hypot(p.x-t.x,p.y-t.y)<KILL_R){
        t.isDead=true;
        GS.corpses.push({x:t.x,y:t.y,color:t.color,hat:t.hat,name:t.name});
        GS.killCDs[id]=KILL_CD_TIME;
        bcastSnd('kill');checkWin();
        devLog(`KILL: ${p.name} → ${t.name}`);
        break;
      }
    }
  }
  else if(action==='report'&&p.inVent===-1){
    for(const c of GS.corpses){
      if(Math.hypot(p.x-c.x,p.y-c.y)<REPORT_R){
        bcastCutscene(p.name,c.color);startMeeting(`${p.name}이(가) 시체를 발견!`);break;
      }
    }
  }
  else if(action==='emergency'&&p.inVent===-1){
    if((GS.emergCDs[id]||0)>0)return;
    const eb=MAP.emergency;
    if(p.x>eb.x&&p.x<eb.x+eb.w&&p.y>eb.y&&p.y<eb.y+eb.h){
      GS.emergCDs[id]=EMERG_CD;
      bcastCutscene(p.name,null);startMeeting(`${p.name}이(가) 비상 회의 소집!`);bcastSnd('emergency');
    }
  }
  else if(action==='sabotage_lights'&&isImp&&!GS.sabActive&&GS.sabCD<=0){
    GS.sabActive='lights';GS.sabTimer=45;GS.sabCD=30;bcastSnd('sabotage');devLog('SABOTAGE: lights');
  }
  else if(action==='sabotage_reactor'&&isImp&&!GS.sabActive&&GS.sabCD<=0){
    GS.sabActive='reactor';GS.sabTimer=60;GS.sabCD=30;bcastSnd('sabotage');devLog('SABOTAGE: reactor');
  }
  else if(action==='sabotage_o2'&&isImp&&!GS.sabActive&&GS.sabCD<=0){
    GS.sabActive='o2';GS.sabTimer=45;GS.sabCD=30;bcastSnd('sabotage');devLog('SABOTAGE: o2');
  }
  else if(action==='fix_sab'){
    if(GS.sabActive===extra?.sabType){GS.sabActive=null;snd('task');devLog('FIX SAB');}
  }
}

function checkWin(){
  let crew=0,imps=0;
  for(const id in GS.players){if(!GS.players[id].isDead) GS.imposters.includes(id) ? imps++ : crew++;}
  if(imps===0){endGame('CREWMATE WIN 🎉','임포스터 모두 제거!');return;}
  if(imps>=crew){endGame('IMPOSTOR WIN 💀','임포스터 승리!');return;}
  if(GS.tasksCompleted>=GS.tasksTotal&&GS.tasksTotal>0){endGame('TASK WIN ✅','모든 업무 완료!');return;}
}
function endGame(w,s){GS.phase='GameOver';GS.winner=w;GS.winnerSub=s;}

function startMeeting(reason){
  GS.phase='Voting';GS.votes={};GS.tallies={};GS.sabActive=null;
  const sp=MAP.spawn||{x:1480,y:1380};
  for(const id in GS.players){GS.players[id].x=sp.x+(Math.random()*200-100);GS.players[id].y=sp.y+(Math.random()*200-100);GS.players[id].inVent=-1;}
  closeMinigame();
  setTimeout(()=>sysChat(reason||'비상 회의!'),300);
}

function handleVote(vid,tid){
  if(GS.votes[vid])return;
  GS.votes[vid]=tid;GS.tallies[tid]=(GS.tallies[tid]||0)+1;
  const alive=Object.values(GS.players).filter(p=>!p.isDead).length;
  if(Object.keys(GS.votes).length>=alive)tallyVotes();
}
function tallyVotes(){
  let max=0,ejected=null;
  for(const id in GS.tallies)if(GS.tallies[id]>max){max=GS.tallies[id];ejected=id;}
  if(ejected&&ejected!=='SKIP'&&GS.players[ejected]){
    GS.players[ejected].isDead=true;
    const ep=GS.players[ejected];
    const wasImp=GS.imposters.includes(ejected);
    sysChat(`${ep.name} 추방! ${wasImp?'임포스터였습니다🔴':'크루원이었습니다🟢'}`);
    snd('eject');
  } else {sysChat('투표 없이 넘어갑니다.');}
  GS.corpses=[];checkWin();
  if(GS.phase==='Voting')GS.phase='Playing';
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

let _lastPhase='Lobby';
function syncState(gs){
  const old=GS.phase; GS=gs; MAP=MAPS[GS.mapId]||MAP;
  if(old!=='Voting'&&GS.phase==='Voting')showVoting();
  if(old==='Voting'&&GS.phase==='Playing'){document.getElementById('voting-ui').style.display='none';if(votingTimerInt)clearInterval(votingTimerInt);}
  if(GS.phase==='GameOver')showGameOver();
  if(GS.phase==='Lobby')document.getElementById('game-over-ui').style.display='none';
}

// host-side phase watcher
setInterval(()=>{
  if(!isHost)return;
  if(GS.phase!==_lastPhase){
    if(GS.phase==='Voting'&&_lastPhase!=='Voting')showVoting();
    if(_lastPhase==='Voting'&&GS.phase==='Playing'){document.getElementById('voting-ui').style.display='none';if(votingTimerInt)clearInterval(votingTimerInt);}
    if(GS.phase==='GameOver')showGameOver();
    if(GS.phase==='Lobby')document.getElementById('game-over-ui').style.display='none';
    _lastPhase=GS.phase;
  }
},150);

// --- Wire task ---
const WIRE_COLS=['#ff4757','#2ed573','#1e90ff','#ffa502'];
let wireS={left:[],right:[],drag:-1,mx:0,my:0};

function initWires(){
  const ch=tCanvas.height, sp=ch/5;
  const lc=[...WIRE_COLS].sort(()=>Math.random()-0.5);
  const rc=[...WIRE_COLS].sort(()=>Math.random()-0.5);
  wireS.left=lc.map((color,i)=>({color,y:sp*(i+1),conn:-1}));
  wireS.right=rc.map((color,i)=>({color,y:sp*(i+1)}));
  wireS.drag=-1;
}
function drawWires(){
  const cw=tCanvas.width,ch=tCanvas.height;
  tCtx.fillStyle='#0d0f16';tCtx.fillRect(0,0,cw,ch);
  tCtx.fillStyle='rgba(255,255,255,0.85)';tCtx.font='bold 15px Nunito';tCtx.textAlign='center';
  tCtx.fillText('🔧 배선 연결',cw/2,26);
  tCtx.fillStyle='rgba(255,255,255,0.04)';tCtx.fillRect(0,36,cw,ch-36);
  wireS.left.forEach((w)=>{
    tCtx.fillStyle=w.color;tCtx.beginPath();tCtx.roundRect(12,w.y-14,34,28,5);tCtx.fill();
    tCtx.fillStyle='#000';tCtx.fillRect(42,w.y-4,7,8);
  });
  wireS.right.forEach((w)=>{
    tCtx.fillStyle=w.color;tCtx.beginPath();tCtx.roundRect(cw-46,w.y-14,34,28,5);tCtx.fill();
    tCtx.fillStyle='#000';tCtx.fillRect(cw-46,w.y-4,7,8);
  });
  wireS.left.forEach((w,i)=>{
    tCtx.lineWidth=5;tCtx.strokeStyle=w.color;tCtx.lineCap='round';
    if(w.conn!==-1){
      const ry=wireS.right[w.conn].y;
      tCtx.beginPath();tCtx.moveTo(50,w.y);tCtx.bezierCurveTo(cw*0.35,w.y,cw*0.65,ry,cw-50,ry);tCtx.stroke();
    } else if(wireS.drag===i){
      tCtx.beginPath();tCtx.moveTo(50,w.y);tCtx.lineTo(wireS.mx,wireS.my);tCtx.stroke();
    }
  });
}
tCanvas.addEventListener('pointerdown',e=>{
  if(currentTaskType!=='wires'&&currentTaskType!=='wires_sab')return;
  const r=tCanvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  wireS.left.forEach((w,i)=>{if(w.conn===-1&&mx<=75&&Math.abs(my-w.y)<30)wireS.drag=i;});
  e.preventDefault();
});
tCanvas.addEventListener('pointermove',e=>{
  if(wireS.drag!==-1){const r=tCanvas.getBoundingClientRect();wireS.mx=e.clientX-r.left;wireS.my=e.clientY-r.top;drawWires();}
  e.preventDefault();
});
tCanvas.addEventListener('pointerup',e=>{
  if(wireS.drag===-1)return;
  const idx=wireS.drag,lw=wireS.left[idx],cw=tCanvas.width;
  wireS.right.forEach((rw,ri)=>{
    if(wireS.mx>=cw-70&&Math.abs(wireS.my-rw.y)<30){if(lw.color===rw.color){lw.conn=ri;snd('task');}}
  });
  wireS.drag=-1;drawWires();
  if(wireS.left.every(w=>w.conn!==-1))setTimeout(completeCurrentTask,300);
  e.preventDefault();
});

// --- Card Swipe ---
let cardS={phase:'wait',x:50,speed:0,success:false,startTime:0,result:null};
let cardAnimId=null;
function initCardSwipe(){
  cardS={phase:'wait',x:50,speed:0,success:false,startTime:0,result:null};
  drawCardSwipe();
}
function drawCardSwipe(){
  const cw=tCanvas.width,ch=tCanvas.height;
  tCtx.fillStyle='#0d1218';tCtx.fillRect(0,0,cw,ch);
  // reader slot
  const slotX=cw/2-130,slotY=ch/2-15,slotW=260,slotH=30;
  tCtx.fillStyle='#1a2230';tCtx.fillRect(slotX-10,slotY-40,slotW+20,slotH+80);tCtx.strokeStyle='#2e3a4e';tCtx.lineWidth=2;tCtx.strokeRect(slotX-10,slotY-40,slotW+20,slotH+80);
  // green zone
  tCtx.fillStyle='rgba(46,213,115,0.15)';tCtx.fillRect(slotX+80,slotY-40,slotW-170,slotH+80);
  tCtx.strokeStyle='rgba(46,213,115,0.4)';tCtx.lineWidth=1;tCtx.strokeRect(slotX+80,slotY-40,slotW-170,slotH+80);
  // slot
  tCtx.fillStyle='#0a0e15';tCtx.fillRect(slotX,slotY,slotW,slotH);
  tCtx.strokeStyle='#334';tCtx.lineWidth=1.5;tCtx.strokeRect(slotX,slotY,slotW,slotH);
  // card
  if(cardS.phase!=='wait'){
    const cardW=70,cardH=42;
    const cx=slotX+cardS.x,cy=slotY+(slotH-cardH)/2;
    tCtx.fillStyle='#1a3a6e';tCtx.fillRect(cx,cy,cardW,cardH);
    tCtx.fillStyle='#ffa502';tCtx.fillRect(cx+5,cy+8,40,6);tCtx.fillRect(cx+5,cy+20,28,4);
    tCtx.strokeStyle='#2e5ca8';tCtx.lineWidth=1;tCtx.strokeRect(cx,cy,cardW,cardH);
    // speed indicator
    tCtx.fillStyle='rgba(0,0,0,0.5)';tCtx.fillRect(slotX,slotY+slotH+10,slotW,10);
    const speedNorm=Math.min(1,(cardS.speed||2)/8);
    tCtx.fillStyle=speedNorm<0.35?'#2ed573':speedNorm<0.65?'#ffa502':'#ff4757';
    tCtx.fillRect(slotX,slotY+slotH+10,slotW*speedNorm,10);
  }
  // instructions
  tCtx.fillStyle='white';tCtx.font='bold 14px Nunito';tCtx.textAlign='center';
  tCtx.fillText('💳 카드 스와이프',cw/2,ch*0.2);
  if(cardS.phase==='wait'){
    tCtx.font='13px Nunito';tCtx.fillStyle='#8892a4';tCtx.fillText('클릭/탭하여 카드를 밀어 넣으세요',cw/2,ch*0.75);
  } else if(cardS.phase==='swipe'){
    tCtx.font='12px Nunito';tCtx.fillStyle='#8892a4';tCtx.fillText('너무 빠르지 않게 미세요!',cw/2,ch*0.75);
  }
  if(cardS.result){
    tCtx.font='bold 22px Nunito';tCtx.fillStyle=cardS.result==='ok'?'#2ed573':'#ff4757';
    tCtx.fillText(cardS.result==='ok'?'✅ 완료!':'❌ 다시 시도',cw/2,ch*0.88);
  }
}
function cardClick(){
  if(cardS.phase==='wait'){
    cardS.phase='swipe';cardS.x=0;cardS.speed=2+Math.random()*3;cardS.startTime=Date.now();
    if(cardAnimId)cancelAnimationFrame(cardAnimId);
    function step(){
      if(cardS.phase!=='swipe')return;
      cardS.x+=cardS.speed;cardS.speed+=0.08;
      const cw=tCanvas.width,slotW=260;
      if(cardS.x>slotW-70){
        const norm=cardS.speed/8;
        if(norm<0.5){cardS.result='ok';cardS.phase='done';snd('task');setTimeout(completeCurrentTask,600);}
        else{cardS.result='fail';cardS.phase='wait';cardS.x=0;setTimeout(()=>{cardS.result=null;drawCardSwipe();},1200);}
        drawCardSwipe();return;
      }
      drawCardSwipe();cardAnimId=requestAnimationFrame(step);
    }
    cardAnimId=requestAnimationFrame(step);
  }
}
tCanvas.addEventListener('pointerdown',e=>{if(currentTaskType==='cardswipe')cardClick();e.preventDefault();},{passive:false});

// --- Asteroids ---
let astS={bullets:[],rocks:[],ship:{x:0,y:0},score:0,needed:8,fireCD:0,animId:null};
function initAsteroids(){
  const cw=tCanvas.width,ch=tCanvas.height;
  astS={bullets:[],rocks:[],ship:{x:cw/2,y:ch*0.75},score:0,needed:8,fireCD:0};
  for(let i=0;i<5;i++) spawnRock(cw,ch);
  if(astS.animId)cancelAnimationFrame(astS.animId);
  let lt=Date.now();
  function step(){
    if(currentTaskType!=='asteroids'){cancelAnimationFrame(astS.animId);return;}
    const now=Date.now(),dt=(now-lt)/1000;lt=now;
    updateAsteroids(dt,cw,ch);drawAsteroids(cw,ch);
    astS.animId=requestAnimationFrame(step);
  }
  astS.animId=requestAnimationFrame(step);
}
function spawnRock(cw,ch){
  astS.rocks.push({x:Math.random()*cw,y:Math.random()*ch*0.4+30,r:20+Math.random()*20,vx:(Math.random()-0.5)*1.5,vy:0.5+Math.random()*1});
}
function updateAsteroids(dt,cw,ch){
  astS.fireCD=Math.max(0,astS.fireCD-dt);
  astS.bullets.forEach(b=>{b.y-=280*dt;});
  astS.bullets=astS.bullets.filter(b=>b.y>0);
  astS.rocks.forEach(r=>{r.x+=r.vx;r.y+=r.vy;if(r.x<0)r.x=cw;if(r.x>cw)r.x=0;});
  // hit detection
  astS.bullets=astS.bullets.filter(b=>{
    let hit=false;
    astS.rocks=astS.rocks.filter(r=>{
      if(Math.hypot(b.x-r.x,b.y-r.y)<r.r+5){hit=true;astS.score++;snd('task');if(astS.rocks.length<4)spawnRock(cw,ch);return false;}
      return true;
    });
    return !hit;
  });
  astS.rocks=astS.rocks.filter(r=>r.y<ch+50);
  while(astS.rocks.length<3)spawnRock(cw,ch);
  if(astS.score>=astS.needed){setTimeout(completeCurrentTask,300);}
}
function drawAsteroids(cw,ch){
  tCtx.fillStyle='#05070d';tCtx.fillRect(0,0,cw,ch);
  // stars bg
  tCtx.fillStyle='rgba(255,255,255,0.4)';
  for(let i=0;i<30;i++)tCtx.fillRect((i*137)%cw,(i*97)%ch,1,1);
  tCtx.fillStyle='white';tCtx.font='bold 13px Nunito';tCtx.textAlign='center';
  tCtx.fillText(`☄️ 소행성 격추 ${astS.score}/${astS.needed}`,cw/2,20);
  // bullets
  tCtx.fillStyle='#ffa502';
  astS.bullets.forEach(b=>{tCtx.fillRect(b.x-2,b.y-8,4,12);});
  // rocks
  astS.rocks.forEach(r=>{
    tCtx.fillStyle='#5a6272';tCtx.beginPath();tCtx.arc(r.x,r.y,r.r,0,Math.PI*2);tCtx.fill();
    tCtx.strokeStyle='#7a8292';tCtx.lineWidth=2;tCtx.stroke();
  });
  // ship
  const sx=astS.ship.x,sy=astS.ship.y;
  tCtx.fillStyle='#2ed573';tCtx.beginPath();tCtx.moveTo(sx,sy-18);tCtx.lineTo(sx-12,sy+10);tCtx.lineTo(sx+12,sy+10);tCtx.closePath();tCtx.fill();
  tCtx.fillStyle='#ff6b35';tCtx.beginPath();tCtx.moveTo(sx-8,sy+10);tCtx.lineTo(sx,sy+18);tCtx.lineTo(sx+8,sy+10);tCtx.closePath();tCtx.fill();
  tCtx.fillStyle='rgba(46,213,115,0.1)';tCtx.font='11px Nunito';tCtx.fillStyle='#5a6272';tCtx.fillText('탭/클릭: 발사 | 좌우: 이동',cw/2,ch-8);
}
tCanvas.addEventListener('pointerdown',e=>{
  if(currentTaskType!=='asteroids')return;
  const r=tCanvas.getBoundingClientRect();
  const mx=e.clientX-r.left;
  astS.ship.x=mx;
  if(astS.fireCD<=0){astS.bullets.push({x:astS.ship.x,y:astS.ship.y-18});astS.fireCD=0.25;}
  e.preventDefault();
},{passive:false});
tCanvas.addEventListener('pointermove',e=>{
  if(currentTaskType!=='asteroids')return;
  const r=tCanvas.getBoundingClientRect();astS.ship.x=e.clientX-r.left;
  e.preventDefault();
},{passive:false});

// --- Stars task ---
let starS={target:[],current:[],solved:false};
function initStars(){
  starS.solved=false;
  const count=6;
  starS.target=Array.from({length:count},()=>({x:0.2+Math.random()*0.6,y:0.2+Math.random()*0.5}));
  starS.current=starS.target.map(s=>({x:s.x+(Math.random()-0.5)*0.3,y:s.y+(Math.random()-0.5)*0.3,dragging:false,sx:0,sy:0}));
  drawStars();
}
let starDragIdx=-1;
function drawStars(){
  const cw=tCanvas.width,ch=tCanvas.height;
  tCtx.fillStyle='#05070d';tCtx.fillRect(0,0,cw,ch);
  tCtx.fillStyle='rgba(255,255,255,0.25)';
  for(let i=0;i<60;i++)tCtx.fillRect((i*113)%cw,(i*79)%ch,1,1);
  // target constellation
  tCtx.strokeStyle='rgba(46,213,115,0.2)';tCtx.lineWidth=1;
  for(let i=0;i<starS.target.length-1;i++){
    tCtx.beginPath();tCtx.moveTo(starS.target[i].x*cw,starS.target[i].y*ch);
    tCtx.lineTo(starS.target[i+1].x*cw,starS.target[i+1].y*ch);tCtx.stroke();
  }
  starS.target.forEach(s=>{
    tCtx.fillStyle='rgba(46,213,115,0.35)';tCtx.beginPath();tCtx.arc(s.x*cw,s.y*ch,6,0,Math.PI*2);tCtx.fill();
  });
  // current
  tCtx.strokeStyle='rgba(255,165,2,0.5)';tCtx.lineWidth=1.5;
  for(let i=0;i<starS.current.length-1;i++){
    tCtx.beginPath();tCtx.moveTo(starS.current[i].x*cw,starS.current[i].y*ch);
    tCtx.lineTo(starS.current[i+1].x*cw,starS.current[i+1].y*ch);tCtx.stroke();
  }
  starS.current.forEach((s,i)=>{
    const matched=Math.hypot((s.x-starS.target[i].x)*cw,(s.y-starS.target[i].y)*ch)<15;
    tCtx.fillStyle=matched?'#ffa502':'#fff';
    tCtx.beginPath();tCtx.arc(s.x*cw,s.y*ch,8,0,Math.PI*2);tCtx.fill();
    tCtx.fillStyle='#000';tCtx.font='bold 10px Nunito';tCtx.textAlign='center';tCtx.textBaseline='middle';
    tCtx.fillText(i+1,s.x*cw,s.y*ch);tCtx.textBaseline='alphabetic';
  });
  tCtx.fillStyle='white';tCtx.font='bold 13px Nunito';tCtx.textAlign='center';
  tCtx.fillText('⭐ 별 지도 맞추기',cw/2,20);
  tCtx.font='11px Nunito';tCtx.fillStyle='#5a6272';tCtx.fillText('별을 녹색 위치로 드래그',cw/2,ch-8);
}
tCanvas.addEventListener('pointerdown',e=>{
  if(currentTaskType!=='stars')return;
  const r=tCanvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  const cw=tCanvas.width,ch=tCanvas.height;
  starDragIdx=-1;
  starS.current.forEach((s,i)=>{if(Math.hypot(mx-s.x*cw,my-s.y*ch)<16){starDragIdx=i;}});
  e.preventDefault();
},{passive:false});
tCanvas.addEventListener('pointermove',e=>{
  if(currentTaskType!=='stars'||starDragIdx===-1)return;
  const r=tCanvas.getBoundingClientRect(),cw=tCanvas.width,ch=tCanvas.height;
  starS.current[starDragIdx].x=Math.max(0,Math.min(1,(e.clientX-r.left)/cw));
  starS.current[starDragIdx].y=Math.max(0,Math.min(1,(e.clientY-r.top)/ch));
  drawStars();
  if(starS.current.every((s,i)=>Math.hypot((s.x-starS.target[i].x)*cw,(s.y-starS.target[i].y)*ch)<15)){
    snd('task');setTimeout(completeCurrentTask,400);
  }
  e.preventDefault();
},{passive:false});
tCanvas.addEventListener('pointerup',e=>{starDragIdx=-1;e.preventDefault();},{passive:false});

// --- Fuel task ---
let fuelS={filled:0,pouring:false};
function initFuel(){
  fuelS={filled:0,pouring:false};
  drawFuel();
}
function drawFuel(){
  const cw=tCanvas.width,ch=tCanvas.height;
  tCtx.fillStyle='#05080f';tCtx.fillRect(0,0,cw,ch);
  tCtx.fillStyle='white';tCtx.font='bold 14px Nunito';tCtx.textAlign='center';
  tCtx.fillText('⛽ 연료 주입',cw/2,26);
  // tank
  const tx=cw/2-40,ty=ch*0.25,tw=80,th=ch*0.5;
  tCtx.fillStyle='#1a2230';tCtx.fillRect(tx,ty,tw,th);
  tCtx.fillStyle='#ff6b35';tCtx.fillRect(tx+2,ty+th*(1-fuelS.filled)-2+2,tw-4,th*fuelS.filled);
  tCtx.strokeStyle='#4e5f74';tCtx.lineWidth=3;tCtx.strokeRect(tx,ty,tw,th);
  // gauge lines
  for(let i=1;i<4;i++){tCtx.strokeStyle='rgba(255,255,255,0.15)';tCtx.lineWidth=1;tCtx.beginPath();tCtx.moveTo(tx,ty+th*i/4);tCtx.lineTo(tx+tw,ty+th*i/4);tCtx.stroke();}
  // label
  tCtx.fillStyle='white';tCtx.font='bold 16px Nunito';tCtx.textAlign='center';
  tCtx.fillText(`${Math.floor(fuelS.filled*100)}%`,cw/2,ty+th+28);
  // hold button
  const bx=cw/2-55,by=ch*0.84,bw=110,bh=38;
  tCtx.fillStyle=fuelS.pouring?'#ff6b35':'#2e3a4e';tCtx.beginPath();tCtx.roundRect(bx,by,bw,bh,8);tCtx.fill();
  tCtx.fillStyle='white';tCtx.font='bold 13px Nunito';tCtx.fillText(fuelS.pouring?'주입 중...':'길게 누르기',cw/2,by+bh/2+5);
}
tCanvas.addEventListener('pointerdown',e=>{
  if(currentTaskType!=='fuel')return;
  fuelS.pouring=true;
  function fill(){
    if(!fuelS.pouring||currentTaskType!=='fuel')return;
    fuelS.filled=Math.min(1,fuelS.filled+0.012);
    drawFuel();
    if(fuelS.filled>=1){snd('task');setTimeout(completeCurrentTask,400);return;}
    requestAnimationFrame(fill);
  }
  fill();
  e.preventDefault();
},{passive:false});
tCanvas.addEventListener('pointerup',e=>{fuelS.pouring=false;drawFuel();e.preventDefault();},{passive:false});

// --- Reactor hand ---
let reactorS={left:false,right:false,both:0,needed:3};
function initReactor(){
  reactorS={left:false,right:false,both:0,needed:3};
  drawReactor();
}
function drawReactor(){
  const cw=tCanvas.width,ch=tCanvas.height;
  tCtx.fillStyle='#080f0a';tCtx.fillRect(0,0,cw,ch);
  tCtx.fillStyle='white';tCtx.font='bold 14px Nunito';tCtx.textAlign='center';
  tCtx.fillText('☢️ 원자로 핸드프린트',cw/2,24);
  // panels
  const pad=(w,lbl,active)=>{
    tCtx.fillStyle=active?'rgba(46,213,115,0.3)':'rgba(255,71,87,0.15)';
    tCtx.strokeStyle=active?'#2ed573':'#ff4757';tCtx.lineWidth=3;
    tCtx.beginPath();tCtx.roundRect(w.x,w.y,w.w,w.h,12);tCtx.fill();tCtx.stroke();
    tCtx.fillStyle=active?'#2ed573':'#ff4757';tCtx.font='bold 13px Nunito';tCtx.textAlign='center';
    tCtx.fillText(lbl,w.x+w.w/2,w.y+w.h/2-8);
    tCtx.font='24px sans-serif';tCtx.fillText('🖐',w.x+w.w/2,w.y+w.h/2+20);
  };
  pad({x:cw*0.1,y:ch*0.25,w:cw*0.35,h:ch*0.45},'왼손',reactorS.left);
  pad({x:cw*0.55,y:ch*0.25,w:cw*0.35,h:ch*0.45},'오른손',reactorS.right);
  // progress
  tCtx.fillStyle='rgba(0,0,0,0.5)';tCtx.fillRect(cw*0.1,ch*0.8,cw*0.8,14);
  tCtx.fillStyle='#2ed573';tCtx.fillRect(cw*0.1,ch*0.8,cw*0.8*(reactorS.both/reactorS.needed),14);
  tCtx.strokeStyle='#fff';tCtx.lineWidth=1.5;tCtx.strokeRect(cw*0.1,ch*0.8,cw*0.8,14);
  tCtx.fillStyle='rgba(255,255,255,0.5)';tCtx.font='11px Nunito';tCtx.fillText('두 손을 동시에 올리세요',cw/2,ch*0.95);
}
function reactorTouch(e){
  if(currentTaskType!=='reactor')return;
  const r=tCanvas.getBoundingClientRect(),cw=tCanvas.width,ch=tCanvas.height;
  let L=false,R=false;
  for(let i=0;i<e.touches.length;i++){
    const tx=(e.touches[i].clientX-r.left)/cw;
    if(tx<0.5)L=true;else R=true;
  }
  if(!e.touches){const mx=(e.clientX-r.left)/cw;if(mx<0.5)L=true;else R=true;}
  reactorS.left=L;reactorS.right=R;
  if(L&&R){reactorS.both++;if(reactorS.both>=reactorS.needed){snd('task');setTimeout(completeCurrentTask,400);}}
  drawReactor();e.preventDefault();
}

function openTask(taskId,taskType){
  currentTaskId=taskId; currentTaskType=taskType;
  document.getElementById('minigame-popup').style.display='block';
  resize();
  if(taskType==='wires'||taskType==='wires_sab'){initWires();drawWires();}
  else if(taskType==='cardswipe')initCardSwipe();
  else if(taskType==='asteroids')initAsteroids();
  else if(taskType==='stars')initStars();
  else if(taskType==='fuel')initFuel();
  else if(taskType==='reactor')initReactor();
}

function performTask(){
  const me=GS.players[myId];if(!me||me.isDead||me.inVent!==-1)return;
  for(const t of MAP.tasks){
    if(me.x>t.x&&me.x<t.x+t.w&&me.y>t.y&&me.y<t.y+t.h){
      if(t.isSab){
        if(GS.sabActive!==t.sabType)return;
        openTask(t.id,'wires_sab');
      } else {
        if(GS.imposters.includes(myId)||myLocalTasks.includes(t.id))return;
        openTask(t.id,t.type);
      }
      break;
    }
  }
}

function completeCurrentTask(){
  if(currentTaskId===null)return;
  const t=MAP.tasks.find(z=>z.id===currentTaskId);
  if(!t)return;
  if(t.isSab){
    if(isHost){GS.sabActive=null;}else hostConn.send({type:'action',action:'fix_sab',extra:{sabType:t.sabType}});
    GS.sabActive=null;bcastSnd('task');
  } else {
    myLocalTasks.push(currentTaskId);
    if(t.visual){GS.visualTasks[currentTaskId]=GS.visualTasks[currentTaskId]||[];GS.visualTasks[currentTaskId].push(myId);}
    if(isHost){GS.tasksCompleted++;checkWin();snd('task');}
    else hostConn.send({type:'task_done'});
  }
  closeMinigame();
}
function closeMinigame(){
  document.getElementById('minigame-popup').style.display='none';
  currentTaskId=null;currentTaskType=null;
  if(astS.animId){cancelAnimationFrame(astS.animId);astS.animId=null;}
  if(cardAnimId){cancelAnimationFrame(cardAnimId);cardAnimId=null;}
}

function drawMinimap(me){
  const S=130,ratio=S/WORLD;
  mCtx.clearRect(0,0,S,S);
  mCtx.fillStyle='#08090e';mCtx.fillRect(0,0,S,S);
  mCtx.fillStyle='#232c3a';MAP.walls.forEach(w=>mCtx.fillRect(w.x*ratio,w.y*ratio,Math.max(1,w.w*ratio),Math.max(1,w.h*ratio)));
  MAP.tasks.forEach(t=>{
    const active=t.isSab&&GS.sabActive===t.sabType;
    mCtx.fillStyle=active?(Date.now()%500<250?'#ff4757':'#300'):'#2a3540';
    mCtx.fillRect(t.x*ratio,t.y*ratio,t.w*ratio,t.h*ratio);
  });
  mCtx.fillStyle='#3d4a5c';MAP.vents.forEach(v=>mCtx.fillRect(v.x*ratio-2,v.y*ratio-2,4,4));
  const eb=MAP.emergency;
  mCtx.fillStyle='#c0392b';mCtx.fillRect(eb.x*ratio,eb.y*ratio,eb.w*ratio,eb.h*ratio);
  const isImp=GS.imposters.includes(myId);
  for(const id in GS.players){
    if(id===myId)continue;
    const p=GS.players[id];if(p.isDead||p.inVent!==-1)continue;
    const visible=isImp||Math.hypot(me.x-p.x,me.y-p.y)<(GS.sabActive==='lights'?130:WORLD);
    if(!visible)continue;
    mCtx.fillStyle=p.color;mCtx.beginPath();mCtx.arc(p.x*ratio,p.y*ratio,2.5,0,Math.PI*2);mCtx.fill();
  }
  GS.corpses.forEach(c=>{mCtx.fillStyle='rgba(255,71,87,0.7)';mCtx.beginPath();mCtx.arc(c.x*ratio,c.y*ratio,2,0,Math.PI*2);mCtx.fill();});
  mCtx.fillStyle='#2ed573';mCtx.strokeStyle='white';mCtx.lineWidth=0.5;
  mCtx.beginPath();mCtx.arc(me.x*ratio,me.y*ratio,3.5,0,Math.PI*2);mCtx.fill();mCtx.stroke();
}

// ═══════════════════════════════
//  DRAW WORLD
// ═══════════════════════════════
let camera={x:0,y:0};
let animT=0,lastT=Date.now();

function getVision(){
  if(GS.sabActive==='lights'&&!GS.imposters.includes(myId))return 105;
  return 390;
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#0b0e14';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.save();ctx.translate(-camera.x,-camera.y);
  // map bg
  ctx.fillStyle=MAP.color||'#14181f';ctx.fillRect(0,0,WORLD,WORLD);
  // grid
  ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=1;
  for(let x=0;x<WORLD;x+=120){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,WORLD);ctx.stroke();}
  for(let y=0;y<WORLD;y+=120){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(WORLD,y);ctx.stroke();}
  // rooms
  MAP.rooms?.forEach(r=>{
    ctx.fillStyle='rgba(255,255,255,0.012)';ctx.fillRect(r.x,r.y,r.w,r.h);
    ctx.strokeStyle='rgba(255,255,255,0.055)';ctx.lineWidth=1;ctx.strokeRect(r.x,r.y,r.w,r.h);
    ctx.fillStyle='rgba(255,255,255,0.14)';ctx.font='bold 12px Nunito';ctx.textAlign='center';
    ctx.fillText(r.name,r.x+r.w/2,r.y+18);
  });
  // task zones
  MAP.tasks.forEach(t=>{
    const isSabActive=t.isSab&&GS.sabActive===t.sabType;
    const isMyTask=!t.isSab&&!myLocalTasks.includes(t.id)&&!GS.imposters.includes(myId);
    const pulse=4*Math.sin(Date.now()/200);
    ctx.fillStyle=isSabActive?`rgba(255,${70+70*Math.abs(Math.sin(Date.now()/150))},50,0.32)`:t.color;
    ctx.fillRect(t.x-4,t.y-4,t.w+8,t.h+8);
    ctx.strokeStyle=isSabActive?'#ff4757':isMyTask?'rgba(46,213,115,0.4)':'rgba(255,255,255,0.1)';
    ctx.lineWidth=isSabActive?2.5:1;ctx.strokeRect(t.x,t.y,t.w,t.h);
    if(!t.isSab||isSabActive){
      ctx.fillStyle=isSabActive?'#ff4757':isMyTask?'rgba(46,213,115,0.75)':'rgba(255,255,255,0.4)';
      ctx.font='bold 11px Nunito';ctx.textAlign='center';ctx.fillText(t.name,t.x+t.w/2,t.y+t.h/2+4);
    }
    // visual task indicator
    if(t.visual&&GS.visualTasks[t.id]?.length>0){
      ctx.fillStyle='rgba(255,165,2,0.7)';ctx.font='10px Nunito';ctx.fillText('★VISUAL',t.x+t.w/2,t.y-5);
    }
  });
  // emergency button
  const eb=MAP.emergency;
  const ecd=GS.emergCDs[myId]||0;
  ctx.fillStyle=ecd>0?'#1a1205':'#8b0000';
  ctx.beginPath();ctx.arc(eb.x+eb.w/2,eb.y+eb.h/2,eb.w/2,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=ecd>0?'#6b4c00':'#ff4444';ctx.lineWidth=4;ctx.stroke();
  const gl=ctx.createRadialGradient(eb.x+eb.w/2,eb.y+eb.h/2,5,eb.x+eb.w/2,eb.y+eb.h/2,eb.w/2);
  gl.addColorStop(0,ecd>0?'rgba(180,120,0,0.3)':'rgba(255,100,100,0.4)');gl.addColorStop(1,'transparent');
  ctx.fillStyle=gl;ctx.beginPath();ctx.arc(eb.x+eb.w/2,eb.y+eb.h/2,eb.w/2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='white';ctx.font='bold 10px Nunito';ctx.textAlign='center';
  ctx.fillText('BUTTON',eb.x+eb.w/2,eb.y+eb.h/2+4);
  // vents
  MAP.vents.forEach(v=>{
    ctx.fillStyle='#1a202e';ctx.beginPath();ctx.ellipse(v.x,v.y,32,22,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#2e3a4e';ctx.lineWidth=2;ctx.stroke();
    ctx.strokeStyle='#242e3e';ctx.lineWidth=1.5;
    for(let i=-18;i<=18;i+=6){ctx.beginPath();ctx.moveTo(v.x+i,v.y-14);ctx.lineTo(v.x+i,v.y+14);ctx.stroke();}
  });
  // walls
  MAP.walls.forEach(w=>{
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(w.x+4,w.y+4,w.w,w.h);
    const gr=ctx.createLinearGradient(w.x,w.y,w.x,w.y+w.h);
    gr.addColorStop(0,'#3d4a5c');gr.addColorStop(1,'#242d3c');
    ctx.fillStyle=gr;ctx.fillRect(w.x,w.y,w.w,w.h);
    ctx.fillStyle='#4d5f74';ctx.fillRect(w.x,w.y,w.w,7);
    ctx.strokeStyle='#5a6f88';ctx.lineWidth=1.5;ctx.strokeRect(w.x,w.y,w.w,w.h);
  });
  // corpses
  GS.corpses.forEach(c=>{
    ctx.save();ctx.translate(c.x,c.y);
    ctx.fillStyle='rgba(255,0,0,0.12)';ctx.beginPath();ctx.ellipse(0,12,28,10,0,0,Math.PI*2);ctx.fill();
    drawChar(ctx,0,0,c.color,c.hat||'',-1,true);ctx.restore();
  });
  ctx.restore();

  // --- players ---
  const myP=GS.players[myId];
  const myIsImp=GS.imposters.includes(myId);
  // Update sprite walk animation (10 frames, ~8fps walk cycle)
  animT+=0.15;
  // Per-player: store individual walk timer so each moves independently
  for(const [id,p] of Object.entries(GS.players)){
    if(p.isDead||p.inVent!==-1)continue;
    if(GS.phase==='Playing'&&myP&&id!==myId){
      if(Math.hypot(myP.x-p.x,myP.y-p.y)>getVision()&&!myIsImp)continue;
    }
    const rx=p.x-camera.x,ry=p.y-camera.y;
    // Pick sprite frame for this player
    if(p.isMoving){
      p._walkT=(p._walkT||0)+0.22;
      currentSpriteFrame=1+Math.floor(p._walkT)%9; // frames 1-9 are walk
    } else {
      p._walkT=0;
      currentSpriteFrame=0; // frame 0 = idle
    }
    ctx.save();
    const impKnown=GS.imposters.includes(id)&&myIsImp;
    // name tag
    ctx.font='bold 12px Nunito';ctx.textAlign='center';
    ctx.shadowColor='rgba(0,0,0,0.95)';ctx.shadowBlur=5;
    ctx.fillStyle=impKnown?'#ff6b6b':'white';
    ctx.fillText(p.name+(id===myId?' ◀':''),rx,ry-38);
    ctx.shadowBlur=0;
    // imposter red glow behind known imposter
    if(impKnown){
      ctx.fillStyle='rgba(255,71,87,0.12)';ctx.beginPath();ctx.arc(rx,ry,36,0,Math.PI*2);ctx.fill();
    }
    // vent glow
    if(p.inVent!==-1){
      ctx.fillStyle='rgba(116,125,140,0.3)';ctx.beginPath();ctx.arc(rx,ry,30,0,Math.PI*2);ctx.fill();
    }
    drawChar(ctx,rx,ry,p.color,p.hat,p.facing,false,1.0);
    ctx.restore();
  }
  // self ghost if dead
  if(myP?.isDead&&myP.inVent===-1){
    currentSpriteFrame=0;
    drawChar(ctx,myP.x-camera.x,myP.y-camera.y,myP.color,myP.hat,myP.facing,true);
  }
  // vision mask
  if(GS.phase==='Playing'&&myP&&!myP.isDead){
    const px=myP.x-camera.x,py=myP.y-camera.y;
    const vr=getVision();
    const dark=GS.sabActive==='lights'?0.97:0.70;
    ctx.save();ctx.fillStyle=`rgba(0,0,0,${dark})`;
    ctx.beginPath();ctx.rect(0,0,canvas.width,canvas.height);
    ctx.arc(px,py,vr,0,Math.PI*2,true);ctx.fill('evenodd');ctx.restore();
  }
  if(myP)drawMinimap(myP);
}

// ═══════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════
function mainLoop(){
  const now=Date.now(),dt=(now-lastT)/1000;lastT=now;
  if(isHost){
    if(GS.phase==='Playing'){
      GS.sabCD=Math.max(0,GS.sabCD-dt);
      if(GS.sabActive&&GS.sabTimer>0){
        GS.sabTimer-=dt;
        if(GS.sabTimer<=0){
          if(GS.sabActive==='reactor'||GS.sabActive==='o2')endGame('IMPOSTOR WIN 💀','사보타지 복구 실패!');
          GS.sabActive=null;
        }
      }
      for(const id in GS.killCDs)if(GS.killCDs[id]>0)GS.killCDs[id]=Math.max(0,GS.killCDs[id]-dt);
      for(const id in GS.emergCDs)if(GS.emergCDs[id]>0)GS.emergCDs[id]=Math.max(0,GS.emergCDs[id]-dt);
    }
    handleMove(myId,keys,joyVector);
    sendAll({type:'state',gs:GS});
  } else if(hostConn?.open){
    hostConn.send({type:'input',keys,vec:joyVector});
  }
  const me=GS.players[myId];
  if(me){camera.x+=(me.x-canvas.width/2-camera.x)*0.1;camera.y+=(me.y-canvas.height/2-camera.y)*0.1;}
  updateHUD();draw();
  if(devMode)updateDevInfo();
  requestAnimationFrame(mainLoop);
}
function startLoop(){lastT=Date.now();requestAnimationFrame(mainLoop);}

// ═══════════════════════════════
//  DEVELOPER MODE
// ═══════════════════════════════
function promptDevMode(){
  const pw=prompt('🛠 개발자 모드 비밀번호:');
  if(pw===DEV_PASSWORD){openDevMode();}
  else if(pw!==null){alert('❌ 비밀번호가 틀렸습니다.');}
}
function openDevMode(){
  devMode=true;
  document.getElementById('menu-ui').style.display='none';
  document.getElementById('dev-ui').style.display='flex';
  // init dev game state
  myId='DEV-HOST';isHost=true;
  const sp=MAP.spawn||{x:1480,y:1380};
  GS.players[myId]={x:sp.x,y:sp.y,color:myColor,name:'DEV',hat:myHat,isDead:false,facing:1,isMoving:false,inVent:-1};
  GS.roles[myId]='crewmate';
  document.getElementById('game-ui').style.display='block';
  document.getElementById('minimap-container').style.display='block';
  document.getElementById('joystick-zone').style.display='block';
  document.getElementById('passive-chat').style.display='flex';
  document.getElementById('map-label').style.display='block';
  document.getElementById('room-info').innerText='🛠 개발자 모드';
  if(aCtx.state==='suspended')aCtx.resume();
  if(!lastT||lastT===0)startLoop();
  devLog('개발자 모드 시작');
}
function closeDevMode(){
  document.getElementById('dev-ui').style.display='none';
  document.getElementById('menu-ui').style.display='flex';
  document.getElementById('game-ui').style.display='none';
  document.getElementById('minimap-container').style.display='none';
  document.getElementById('joystick-zone').style.display='none';
  document.getElementById('passive-chat').style.display='none';
  document.getElementById('map-label').style.display='none';
  devMode=false;myId=null;isHost=false;
  GS={phase:'Lobby',mapId:'skeld',imposters:[],roles:{},players:{},corpses:[],tasksTotal:0,tasksCompleted:0,visualTasks:{},votes:{},tallies:{},winner:'',winnerSub:'',sabActive:null,sabTimer:0,sabCD:0,killCDs:{},emergCDs:{}};
}
function devSetMap(mapId){
  currentMapId=mapId;MAP=MAPS[mapId];GS.mapId=mapId;
  const sp=MAP.spawn||{x:1480,y:1380};
  if(GS.players[myId])GS.players[myId].x=sp.x,GS.players[myId].y=sp.y;
  devLog(`맵 변경: ${MAP.name}`);
}
function devSetRole(role){
  if(!myId)return;
  GS.roles[myId]=role;
  if(role==='imposter'){
    if(!GS.imposters.includes(myId))GS.imposters.push(myId);
  } else {
    GS.imposters=GS.imposters.filter(id=>id!==myId);
  }
  if(GS.phase!=='Playing'){
    GS.phase='Playing';
    // Init cooldowns so buttons work
    GS.killCDs[myId]=0; GS.emergCDs[myId]=0;
    GS.sabotageCooldown=0; GS.sabCD=0;
  }
  // Ensure tasks exist so task bar shows
  const normalTasks=MAP.tasks.filter(t=>!t.isSab);
  GS.tasksTotal=normalTasks.length;
  GS.tasksCompleted=0;
  myLocalTasks=[];
  const roleLabels={crewmate:'크루원 🟢',engineer:'엔지니어 🔵',scientist:'사이언티스트 🟣',imposter:'임포스터 🔴'};
  devLog(`역할 설정: ${roleLabels[role]||role}`);
  // Hint
  if(role==='crewmate'||role==='engineer'||role==='scientist'){
    devLog('→ E키로 태스크, R로 신고, Q로 비상버튼');
    if(role==='engineer') devLog('→ V키로 벤트 사용 가능');
    if(role==='scientist') devLog('→ 사이언티스트: 생체정보 확인 가능');
  } else {
    devLog('→ SPACE로 킬, G로 사보타지, V로 벤트');
  }
}
function devOpenTask(type){
  if(!myId)return;
  if(GS.phase!=='Playing')GS.phase='Playing';
  currentTaskId=999;
  openTask(999,type);
  devLog(`태스크 열기: ${type}`);
}
function devSabotage(type){
  GS.sabActive=type;GS.sabTimer=type==='lights'?45:60;
  if(GS.phase!=='Playing')GS.phase='Playing';
  snd('sabotage');devLog(`사보타지: ${type}`);
}
function devFixSab(){GS.sabActive=null;devLog('사보타지 복구');}
function devTriggerMeeting(){
  if(GS.phase!=='Playing')GS.phase='Playing';
  startMeeting('개발자 테스트 회의');showVoting();devLog('긴급 회의 발동');
}
function devSpawnCorpse(){
  const me=GS.players[myId];if(!me)return;
  GS.corpses.push({x:me.x+80,y:me.y,color:'#ff4757',hat:'💀',name:'TestCorpse'});
  devLog('시체 생성');
}
function devTeleport(){
  const me=GS.players[myId];if(!me)return;
  me.x=200+Math.random()*(WORLD-400);me.y=200+Math.random()*(WORLD-400);
  devLog(`이동: (${Math.floor(me.x)},${Math.floor(me.y)})`);
}
function devGameOver(text){GS.phase='GameOver';GS.winner=text;GS.winnerSub='개발자 테스트';showGameOver();devLog(`게임 오버: ${text}`);}
function devAddBot(){
  botCounter++;
  const bid='BOT-'+botCounter;
  const sp=MAP.spawn||{x:1480,y:1380};
  GS.players[bid]={x:sp.x+Math.random()*200-100,y:sp.y+Math.random()*200-100,color:COLORS[botCounter%COLORS.length],name:'봇'+botCounter,hat:'🤖',isDead:false,facing:1,isMoving:false,inVent:-1};
  GS.roles[bid]='crewmate';
  devLog(`봇 추가: ${bid}`);
}
function devLog(msg){
  const box=document.getElementById('dev-log');if(!box)return;
  const t=new Date().toLocaleTimeString('ko',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  box.textContent+=`[${t}] ${msg}\n`;box.scrollTop=box.scrollHeight;
}
function updateDevInfo(){
  const box=document.getElementById('dev-info-box');if(!box)return;
  const me=GS.players[myId];
  box.innerHTML=`<div>맵: <strong>${MAP.name||currentMapId}</strong> | 페이즈: <strong>${GS.phase}</strong></div>
<div>역할: <strong>${GS.roles[myId]||'없음'}</strong> | 임포: <strong>${GS.imposters.join(', ')||'없음'}</strong></div>
<div>위치: <strong>${me?Math.floor(me.x)+','+Math.floor(me.y):'?'}</strong></div>
<div>태스크: <strong>${GS.tasksCompleted}/${GS.tasksTotal}</strong> | 사보타지: <strong>${GS.sabActive||'없음'}</strong></div>
<div>플레이어: <strong>${Object.keys(GS.players).length}</strong>명 | 시체: <strong>${GS.corpses.length}</strong>개</div>`;
}

// ─── boot ───
buildCustomUI();
</script>
